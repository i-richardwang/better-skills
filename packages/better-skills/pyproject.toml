# better-skills — CLI for authoring, evaluating, and iterating on Claude
# Agent Skills.
#
# Layout:
#   This package lives at <repo>/packages/better-skills/. The canonical skill
#   folder lives at <repo>/skills/better-skills/ and is the single source of
#   truth for skill content (SKILL.md, agents/, references/, assets/,
#   eval-viewer/).
#
#   The CLI launches grader / viewer subprocesses that need a few of those
#   files at runtime (agents/grader.md, eval-viewer/{generate_review.py,
#   viewer.html}). A build hook in setup.py copies them into scripts/data/
#   before each build / pip install so the wheel is self-contained — no
#   filesystem discovery, no dependency on where the skill folder is
#   installed. See sync_skill_data.py for the manual resync entry point.
#
#   Skill content the LLM main agent reads (analyzer.md / comparator.md /
#   references/ / assets/) stays in the skill folder; the wheel does not
#   ship it.
#
# Dependencies are intentionally minimal: stdlib + pydantic for config
# validation + pyyaml for parsing user-authored evals.json variants.

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "better-skills"
version = "0.5.1"
description = "CLI for authoring, evaluating, and iteratively improving Claude Agent Skills."
readme = "README.md"
requires-python = ">=3.10"
license = { file = "LICENSE.txt" }
authors = [{ name = "Richard Wang" }]
keywords = ["claude", "agent", "skills", "eval", "llm"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Quality Assurance",
  "Topic :: Software Development :: Testing",
]
dependencies = [
  "pydantic>=2.0",
  "pyyaml>=6.0",
]

[project.scripts]
better-skills = "scripts.cli:main"

[project.urls]
Homepage = "https://github.com/i-richardwang/better-skills"
Repository = "https://github.com/i-richardwang/better-skills"
Issues = "https://github.com/i-richardwang/better-skills/issues"

[tool.setuptools]
packages = ["scripts"]

[tool.setuptools.package-data]
# scripts/data/ is generated by sync_skill_data.py (invoked from setup.py
# build hooks). Wildcard so newly synced files don't need pyproject edits.
scripts = ["data/**/*"]
